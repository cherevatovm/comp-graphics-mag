<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Lab 7</title>
  <style>
    body { margin:0; font-family: sans-serif; background:#222; color:#ddd; }
    canvas { width: 100vw; height: 80vh; display:block; }
    .ui { padding: 10px; display:flex; gap:12px; align-items:center; background:#111; color:#ddd; }
    label { font-size:13px; color:#ccc; margin-right:6px; }
    .control { display:flex; align-items:center; gap:8px; }
    input[type=range] { width:160px; }
    select { background:#222; color:#ddd; border:1px solid #444; padding:4px; }
    #meshControlsContainer {
      max-height: 60vh;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      flex-direction: row;
      gap: 8px;
      margin-left: 12px;
      max-width: 100%;
      padding: 6px 6px 6px 0;
      align-items: flex-start;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <canvas id="glcanvas"></canvas>
  <div id="fpsCounter" style="
  position: fixed;
  top: 10px;
  left: 10px;
  color: rgb(204, 233, 204);
  background: rgba(0,0,0,0.5);
  padding: 6px 10px;
  font-family: monospace;
  font-size: 14px;
  border-radius: 4px;
  z-index: 9999;
">
  FPS: 0
</div>

  <div class="ui">
    <div class="control" style="margin-left:auto">
    </div>
    <div id="meshControlsContainer"></div>
  </div>

  <script src="src/sylvester.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
